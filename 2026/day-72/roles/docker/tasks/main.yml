---
- name: Install Docker
  apt:
    name: docker.io
    state: present
    update_cache: true
- name: Install pip for Docker SDK
  apt:
    name: python3-pip
    state: present
- name: Install Docker SDK for Python
  pip:
    name: docker
    state: present
- name: Start and enable Docker
  service:
    name: docker
    state: started
    enabled: true
- name: Pull and run Nginx container
  docker_container:
    name: myapp
    image: nginx:alpine
    state: started
    restart_policy: always
    ports:
      - "8080:80"
